<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TimeCat Status</title>
    <style>
        body {
            width: 200px;
            padding: 15px;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
        }
        .logo { width: 48px; margin-bottom: 10px; }
        .status-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }
        .time { font-size: 1.5rem; font-weight: bold; color: #3498db; }
        .label { font-size: 0.8rem; color: #7f8c8d; }
        .btn-options {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <img src="../icons/icon.svg" class="logo" alt="TimeCat">
    <div class="status-box">
        <div class="label">Time since last break:</div>
        <div id="usage-time" class="time">00:00</div>
    </div>
    <button id="open-options" class="btn-options">Settings</button>
    <script src="popup.js"></script>
</body>
</html>
