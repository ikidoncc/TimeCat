<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TimeCat Status</title>
    <style>
        body {
            width: 200px;
            padding: 15px;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
        }
        .logo { width: 48px; margin-bottom: 10px; }
        .status-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }
        .time { font-size: 1.5rem; font-weight: bold; color: #3498db; }
        .label { font-size: 0.8rem; color: #7f8c8d; }
        .btn-options {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .debug-section {
            margin-top: 15px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .log-container {
            height: 120px;
            overflow-y: auto;
            background: #2c3e50;
            color: #ecf0f1;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            border-radius: 4px;
            margin: 5px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn-clear {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            float: right;
            margin-bottom: 10px;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #34495e; padding-bottom: 2px; }
        .log-time { color: #95a5a6; }
        .log-context { font-weight: bold; color: #3498db; }
        .log-context.error { color: #e74c3c; }
    </style>
    <script src="../utils/logger.js"></script>
</head>
<body>
    <img src="../icons/icon.svg" class="logo" alt="TimeCat">
    <div class="status-box">
        <div class="label">Time since last break:</div>
        <div id="usage-time" class="time">00:00</div>
    </div>
    
    <div class="debug-section">
        <div class="label">Debug Logs:</div>
        <div id="log-container" class="log-container"></div>
        <button id="clear-logs" class="btn-clear">Clear Logs</button>
    </div>

    <button id="open-options" class="btn-options">Settings</button>
    <script src="popup.js"></script>
</body>
</html>
